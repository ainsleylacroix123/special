<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice</title>

<style>
     *{
        box-sizing: border-box;
     }

     body{
        display: flex;
        padding: 0;
        margin: 0;
        background-color: gainsboro;
        flex-direction: column;
        gap: 10px;
     }
     .gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.gallery img{
width:100%;
height:100%;
object-fit:cover;
}
  nav {
      padding: 10px;
      color: white;
      font-size: 25px;
      font-weight: bold;
      font-family: monospace;
      background-color: blue;
      display: flex;
      flex-grow: 1;
      box-shadow: 0px 10px 5px 0px rgba(0,0,0,0.31);
    }

    main{
      margin-right: auto;
      margin-left: auto;
      width: 95vw;
      display: flex;
      flex-grow: 10;
      flex-direction: column;
      gap: 5px;
    }

    section{
      display: flex;
      align-items: center;
      justify-content: space-evenly;      
    }

</style>
</head>

<body>
    <h2>Image Gallery</h2>

<input type="text" id="search" placeholder="Search images">

<div class="gallery" id="gallery"></div>



<script>
     // fetch("https://dog.ceo/api/breed/beagle/image")
    //then(response => response.json())
    //then(data => {
    
 let images = [
 {name:"cat", src:"cat.jpg"},
 {name:"dog", src:"dog.jpg"},
 {name:"bird", src:"bird.jpg"}
];

function displayGallery(data){

let gallery = document.getElementById("gallery");
gallery.innerHTML="";

data.forEach(img => {

gallery.innerHTML += `
<div>
<img src="${img.src}">
<p>${img.name}</p>
</div>
`;

});

}

displayGallery(images);
    
</script>

</body>

</html>
