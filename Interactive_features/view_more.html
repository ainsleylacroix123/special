<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interactive Sorting Feature</title>
    <style>
       
    </style>
</head>
<body>
    <h2>Products</h2>

<div id="products"></div>

<div id="details"></div>
   
    <script>
        let products = [
 {name:"Laptop", price:3000, description:"High performance laptop"},
 {name:"Phone", price:1500, description:"Latest smartphone"},
 {name:"Tablet", price:1200, description:"Portable tablet"}
];

function displayProducts(){

let container = document.getElementById("products");

products.forEach((product,index)=>{

container.innerHTML += `
<div>
<h3>${product.name}</h3>
<button onclick="viewMore(${index})">View More</button>
</div>
`;

});

}

function viewMore(index){

let product = products[index];

document.getElementById("details").innerHTML = `
<h2>${product.name}</h2>
<p>Price: ${product.price}</p>
<p>${product.description}</p>
`;

}

displayProducts();
     
    </script>
</body>
</html>
