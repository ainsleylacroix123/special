<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Gallery UI</title>
    <style>
        body { font-family: Arial; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 10px;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        button { margin: 5px; }

       

    </style>
</head>
<body>

<h2>Dog Gallery</h2>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>

<div class="gallery" id="gallery"></div>

<script>
let data = [];
let currentIndex = 0;
let itemsPerPage = 6;

// FETCH DATA
fetch("https://dog.ceo/api/breed/borzoi/images")
.then(res => res.json())
.then(result => {
    console.log(result); // 🔥 always check
    data = result.message;
    displayData();
});

// DISPLAY (with pagination)
function displayData() {
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    let start = currentIndex;
    let end = start + itemsPerPage;

    let pageItems = data.slice(start, end);

    pageItems.forEach(item => {
        gallery.innerHTML += `
            <div class="card">
                <img src="${item}" alt="">
                <button onclick="viewMore('${item}')">
                    View More
                </button>
            </div>
        `;
    });
}

// NEXT
function next(){
    if(currentIndex + itemsPerPage < data.length){
        currentIndex += itemsPerPage;
    } else {
        currentIndex = 0;
    }
    displayData();
}

// PREV
function prev(){
    if(currentIndex - itemsPerPage >= 0){
        currentIndex -= itemsPerPage;
    } else {
        currentIndex = data.length - itemsPerPage;
    }
    displayData();
}

// VIEW MORE
function viewMore(image){
    alert("Viewing image:\n" + image);
}
</script>

</body>
</html>
