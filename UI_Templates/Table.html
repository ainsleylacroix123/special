<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Web App</title>

<style>
    .gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
}

</style>

</head>

<body>
  <input type="text" id="search" placeholder="Search student">

<table border="1">
<thead>
<tr>
<th>Name</th>
<th>Age</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

 <script>
 
    let students = [
{name:"Alice",age:20},
{name:"Bob",age:22},
{name:"Chris",age:19}
];

function displayTable(data){

let body = document.getElementById("tableBody");
body.innerHTML="";

data.forEach(student => {

body.innerHTML += `
<tr>
<td>${student.name}</td>
<td>${student.age}</td>
</tr>
`;

});

}

displayTable(students);
</script>

</body>

</html>
