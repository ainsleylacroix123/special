<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Web App</title>

<style>
    .gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
}

</style>

</head>

<body>
    <h2>Image Gallery</h2>

<input type="text" id="search" placeholder="Search images">

<div class="gallery" id="gallery"></div>


 <script>
    // fetch("https://dog.ceo/api/breed/beagle/image")
    //then(response => response.json())
    //then(data => {
    
 let images = [
 {name:"cat", src:"cat.jpg"},
 {name:"dog", src:"dog.jpg"},
 {name:"bird", src:"bird.jpg"}
];

function displayGallery(data){

let gallery = document.getElementById("gallery");
gallery.innerHTML="";

data.forEach(img => {

gallery.innerHTML += `
<div>
<img src="${img.src}">
<p>${img.name}</p>
</div>
`;

});

}

displayGallery(images);
    
</script>

</body>

</html>
